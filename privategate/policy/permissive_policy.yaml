# Permissive policy: keep most spans, mask only credentials.
# Maximizes utility at the cost of leakage. Used as an ablation lower
# bound for privacy.
table:
  IDENTIFIER:
    low: keep
    medium: keep
    high: mask
    critical: mask
  CREDENTIAL:
    low: mask
    medium: mask
    high: secure-slot
    critical: secure-slot
  MEDICAL:
    low: keep
    medium: keep
    high: keep
    critical: abstract
  FINANCIAL:
    low: keep
    medium: keep
    high: mask
    critical: mask
  PERSONAL_CONTEXT:
    low: keep
    medium: keep
    high: keep
    critical: keep
